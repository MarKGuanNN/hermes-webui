# Hermes WebUI — 单容器 Docker Compose
#
# 快速开始（针对大多数用户）：
#   1. (可选) 将 .env.docker.example 复制为 .env 并编辑其值
#   2. docker compose up -d
#   3. 打开 http://localhost:8787
#
# 这是最简单的设置：一个在进程内运行 agent 的 WebUI 容器。
# WebUI 会从挂载的 .hermes 卷中自动检测主机的 UID/GID。
#
# 对于多容器设置（独立的 agent + webui，或 agent+webui+dashboard），
# 请参阅 docker-compose.two-container.yml 或 docker-compose.three-container.yml。

services:
  hermes-webui:
    build: .
    ports:
    # 仅选择一个；使用 127.0.0.1 版本仅暴露给 localhost
      - "127.0.0.1:8787:8787"
#      - "8787:8787"
    volumes:
      # 将您的 Hermes 主目录挂载到容器中。
      # 默认值 (${HOME}/.hermes) 在 macOS (/Users/<您的用户名>/.hermes)
      # 和 Linux (/home/<您的用户名>/.hermes) 上均可使用 —— 标准安装无需更改。
      # 仅当您的 .hermes 位于非标准位置时，才显式设置 HERMES_HOME。
      # macOS 注意事项：将下方的 UID 和 GID 设置为与您的用户 ID 匹配（运行 `id -u` 和 `id -g`）。
      - ${HERMES_HOME:-${HOME}/.hermes}:/home/hermeswebui/.hermes
      # 首次启动时显示的工作区目录（如果您的不同请作调整，容器将使用挂载的 /workspace）
      - ${HERMES_WORKSPACE:-${HOME}/workspace}:/workspace
    environment:
      # 设置为您的主机用户 ID：运行 `id -u` 和 `id -g` 来查找它们。
      # 在 macOS 上，UID 从 501（而不是 1000）开始，因此请在 .env 文件中设置 UID 和 GID：
      #   echo "UID=$(id -u)" >> .env
      #   echo "GID=$(id -g)" >> .env
      # 如果没有此设置，容器可能无法读取您挂载的文件。
      - WANTED_UID=${UID:-1000}
      - WANTED_GID=${GID:-1000}
      # 必填：绑定地址和端口
      - HERMES_WEBUI_HOST=0.0.0.0
      - HERMES_WEBUI_PORT=8787
      # 在何处存储会话、工作区和其他状态（默认：~/.hermes/webui）
      - HERMES_WEBUI_STATE_DIR=/home/hermeswebui/.hermes/webui
      # 首次启动时显示的默认工作区目录
#      - HERMES_WEBUI_DEFAULT_WORKSPACE=/workspace
      # 可选：为远程访问设置密码
      # - HERMES_WEBUI_PASSWORD=your-secret-password
      #
      # 绑定挂载权限处理（修复 #1389, #1399）：
      #   当您挂载一个已存在的 ~/.hermes 目录（常见情况）时，
      #   WebUI 启动时的凭证权限修复程序可能会与
      #   您的主机文件模式冲突（例如 0640 组可读的 .env 文件）。
      #   设置 HERMES_SKIP_CHMOD=1 以完全绕过该修复程序，或者设置
      #   HERMES_HOME_MODE=0640 以允许组权限位，同时依然剥离
      #   全局可读权限。这两者都在 api/startup.py 中有文档说明。
      # - HERMES_SKIP_CHMOD=1
      # - HERMES_HOME_MODE=0640
    restart: unless-stopped
