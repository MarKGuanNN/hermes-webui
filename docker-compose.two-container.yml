# 双容器 Docker Compose：Hermes Agent + Hermes WebUI
#
# 快速开始：
#   docker compose -f docker-compose.two-container.yml up -d
#   打开 http://localhost:8787
#
# 这将在独立的容器中运行 agent 和 web UI，通过共享的 Docker 卷进行连接。
# WebUI 在启动时会从共享的 agent 源码卷中安装 agent 的 Python 依赖。
#
# 何时使用此配置：
#   - 您希望在 agent 网关和 WebUI 之间实现隔离
#   - 您已经在一个独立的容器中运行了 hermes-agent
#   - 您不需要仪表盘（如果需要，请使用 docker-compose.three-container.yml）
#
# 何时不使用此配置：
#   - 当您尝试共享现有的 ~/.hermes 目录时遇到“Permission denied（权限被拒绝）”
#     → 请改用 docker-compose.yml（单容器），或者
#     → 保留此文件，但改用命名卷（默认方式）而不是绑定挂载（bind mounts）
#   - 您使用的是 Podman 3.4 或更老版本，不支持 keep-id 命名空间
#     → 请参阅 https://github.com/sunnysktsang/hermes-suite 获取一体化（all-in-one）镜像
#
# 已知限制 (#681)：从 WebUI 触发的工具运行在 WebUI 容器中，而不是 agent 容器中。
# 如果您在 WebUI 的文件系统中需要 git/node/等工具，请将它们安装在 WebUI 镜像中
# ——或者使用单容器设置，将所有内容放在一个地方。
#
# 关于卷的说明：
#   此文件使用命名 Docker 卷（hermes-home, hermes-agent-src），
#   在任何 Docker 安装环境中都可以开箱即用。如果您更喜欢使用绑定挂载
#   来共享现有的主机目录：
#
#     volumes:
#       hermes-home:
#         driver: local
#         driver_opts:
#           type: none
#           o: bind
#           device: /home/youruser/.hermes
#
#   使用绑定挂载时，两个容器必须挂载相同的主机路径，
#   并且您的主机目录必须可被 UID 1000（默认值）读取。运行：
#     id -u && id -g
#   来查找您的主机 UID/GID，然后将它们放入 .env 文件中：
#     echo "UID=$(id -u)" >> .env
#     echo "GID=$(id -g)" >> .env

services:
  hermes-agent:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-agent
    command: gateway run
    ports:
      # 网关 API —— 仅在 localhost 暴露。
      # hermes-net 上的其他容器通过 http://hermes-agent:8642 访问它。
      # 移除 127.0.0.1: 以将其暴露在主机网络上（例如供远程客户端使用）。
      - "127.0.0.1:8642:8642"
    volumes:
      # 在重启期间持久化配置、状态、会话、技能、记忆
      - hermes-home:/home/hermes/.hermes
      # 暴露 agent 源码，以便 WebUI 可以从中安装依赖
      - hermes-agent-src:/opt/hermes
    environment:
      - HERMES_HOME=/home/hermes/.hermes
      # 对齐共享 hermes-home 卷的容器之间的 UID/GID。
      # 默认值为 1000，以匹配 webui 服务中的 WANTED_UID/WANTED_GID。
      # agent 镜像的 entrypoint 已经支持 usermod 重映射。
      - HERMES_UID=${UID:-1000}
      - HERMES_GID=${GID:-1000}
      # 针对 agent 的绑定挂载权限处理 —— 覆盖范围较窄。
      # 注意：agent 的 HERMES_HOME_MODE 适用于 HERMES_HOME *目录*
      # 的权限模式（默认为 0700）——不适用于凭证文件（与 WebUI 的版本不同）。
      # 如果您设置了此项，则必须保留所有者执行位（owner-execute bit），以便 agent 可以
      # 遍历自己的主目录。0640 会导致 agent 崩溃（没有 x 位 → 无法
      # 遍历）。使用 0750 实现组可遍历，或使用 0701 实现仅执行权限。
      # agent 的容器检测（/.dockerenv）已经在 Docker 内部自动跳过了
      # 凭证的 chmod，因此在这里 HERMES_SKIP_CHMOD 是多余的。
      # - HERMES_HOME_MODE=0750
    restart: unless-stopped
    networks:
      - hermes-net

  hermes-webui:
    image: ghcr.io/nesquena/hermes-webui:latest
    container_name: hermes-webui
    depends_on:
      - hermes-agent
    ports:
      - "127.0.0.1:8787:8787"
    volumes:
      # 与 agent 使用相同的 hermes 主目录 —— 共享配置、会话、状态
      - hermes-home:/home/hermeswebui/.hermes
      # 将 agent 源码挂载到 docker_init.bash 期望的位置。
      # 以只读方式挂载 —— WebUI 仅读取此卷以在启动时
      # 安装 agent 的 Python 依赖（`uv pip install`）。
      # 只读属性在内核层强制执行深度防御。
      - hermes-agent-src:/home/hermeswebui/.hermes/hermes-agent:ro
      # 工作区目录 —— 从 WebUI 浏览和编辑文件。
      # 请将主机路径调整为您的项目目录。
      # 可通过以下方式覆盖：HERMES_WORKSPACE=/your/path docker compose up
      # 使用 ${HOME} 而不是 `~`，以便在 Linux、macOS、WSL2 以及
      # Windows 的 Docker Desktop 上使用相同的默认解析方式。
      - ${HERMES_WORKSPACE:-${HOME}/workspace}:/workspace
    environment:
      - HERMES_WEBUI_HOST=0.0.0.0
      - HERMES_WEBUI_PORT=8787
      - HERMES_WEBUI_STATE_DIR=/home/hermeswebui/.hermes/webui
      # 匹配您主机用户的 UID/GID，以确保正确的文件权限。
      # 在双容器设置中，WebUI 会自动从共享的 hermes-home 卷中检测 UID/GID，
      # 但如果需要，您可以明确地进行覆盖 (#668)：
      # 运行 `id -u` 和 `id -g` 来查找您的值。
      # 在 macOS 上，UID 从 501 开始 —— 请将这些设置在 .env 文件中：
      #   echo "UID=$(id -u)" >> .env && echo "GID=$(id -g)" >> .env
      - WANTED_UID=${UID:-1000}
      - WANTED_GID=${GID:-1000}
      # 可选：为远程访问设置密码
      # - HERMES_WEBUI_PASSWORD=your-secret-password
      # 针对 WebUI 的绑定挂载权限处理（修复了 #1389, #1399）。
      # 注意：WebUI 的 HERMES_HOME_MODE 是凭证文件的阈值（允许
      # 在 .env/.signing_key/等文件上保留组权限位），与 agent 不同，
      # agent 的适用于 HERMES_HOME 目录本身。0640 对于 WebUI
      # 是正确的；请勿将此值复制到 agent 服务块中。
      # - HERMES_SKIP_CHMOD=1
      # - HERMES_HOME_MODE=0640
    restart: unless-stopped
    networks:
      - hermes-net

networks:
  hermes-net:
    driver: bridge

volumes:
  # 重要说明 —— 升级 agent 镜像：
  #   `hermes-agent-src` 卷在首次执行 `up` 时由 agent 镜像的
  #   `/opt/hermes` 初始化，并且 Docker 在后续运行中会原封不动地重用该卷
  #   ——即便是 `docker pull` 了较新的 agent 镜像后也是如此。升级
  #   agent 镜像后，请运行：
  #
  #     docker compose down
  #     docker volume rm <project>_hermes-agent-src
  #     docker compose pull
  #     docker compose up -d
  #
  #   完整的操作步骤（以及原由）记录在 docs/docker.md 中。
  hermes-home:
  hermes-agent-src:
