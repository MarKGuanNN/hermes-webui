# 三容器 Docker Compose：Hermes Agent + Dashboard + WebUI
#
# 快速开始：
#   docker compose -f docker-compose.three-container.yml up -d
#   打开 http://localhost:8787 (聊天界面) 和 http://localhost:9119 (仪表盘)
#
# 这在双容器设置的基础上增加了 Hermes Dashboard，
# 用于监控 Agent 的活动、会话和资源使用情况。
#
# 服务：
#   hermes-agent     — 位于端口 8642 的网关 API（CLI、Telegram、cron、工具）
#   hermes-dashboard — 位于端口 9119 的监控仪表盘
#   hermes-webui     — 位于端口 8787 的浏览器聊天界面
#
# 这三个服务共享同一个 hermes-home 数据卷，因此配置、会话、
# 技能和记忆在所有交互面上都保持一致。
#
# 何时不应使用此配置：
#   - 当您尝试共享现有的 ~/.hermes 目录时遇到“Permission denied (权限拒绝)”错误
#     → 请改用 docker-compose.yml (单容器)，或者
#     → 保留此文件，但改用 命名数据卷 (默认配置) 而不是绑定挂载 (bind mounts)
#   - 您使用的是 Podman 3.4 或更早版本，不支持 keep-id 命名空间
#     → 请参考 https://github.com/sunnysktsang/hermes-suite 获取多合一镜像
#
# 已知限制 (#681)：从 WebUI 触发的工具运行在 WebUI
# 容器中，而不是 agent 容器中。详情请参阅 docker-compose.two-container.yml。
#
# 关于数据卷 (VOLUMES) 的注意事项：
#   此文件使用 Docker 命名数据卷 (hermes-home, hermes-agent-src)，它们
#   开箱即用。如果您更喜欢使用绑定挂载 (例如挂载到现有
#   目录)，请查看 docker-compose.two-container.yml 中的绑定挂载示例。
#   使用绑定挂载时，所有三个容器必须挂载相同的主机路径
#   并且以相同的 UID/GID 运行 (通过下面的 UID/GID 环境变量设置)。

services:
  hermes-agent:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-agent
    command: gateway run
    ports:
      - "127.0.0.1:8642:8642"
    volumes:
      # 在重启期间持久化配置、状态、会话、技能和记忆
      - hermes-home:/home/hermes/.hermes
      # 暴露 agent 源码，以便 WebUI 可以从中安装依赖项
      - hermes-agent-src:/opt/hermes
    environment:
      - HERMES_HOME=/home/hermes/.hermes
      # 在共享 hermes-home 数据卷的容器间对齐 UID/GID。
      # 默认为 1000，以匹配 webui 服务中的 WANTED_UID/WANTED_GID。
      - HERMES_UID=${UID:-1000}
      - HERMES_GID=${GID:-1000}
      # 针对 agent 的绑定挂载权限处理 —— 少数几个覆盖选项。
      # 注意：agent 的 HERMES_HOME_MODE 适用于 HERMES_HOME *目录* 的
      # 权限模式 (默认 0700) —— 而不适用于像 WebUI 变体那样的凭据文件。
      # 如果您设置了此项，您必须保留所有者的执行权限位 (owner-execute bit)，以便 agent 可以
      # 遍历其自己的主目录。设置为 0640 会破坏 agent 运行 (没有 x 位 → 无法
      # 遍历)。使用 0750 允许用户组遍历，或使用 0701 仅允许执行。
      # agent 的容器检测 (/.dockerenv) 已经在 Docker 内自动跳过了
      # 凭据的 chmod，因此在这里设置 HERMES_SKIP_CHMOD 是多余的。
      # - HERMES_HOME_MODE=0750
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
    networks:
      - hermes-net

  hermes-dashboard:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-dashboard
    command: dashboard --host 0.0.0.0 --insecure
    ports:
      - "127.0.0.1:9119:9119"
    volumes:
      - hermes-home:/home/hermes/.hermes
    environment:
      - HERMES_HOME=/home/hermes/.hermes
      # 在共享 hermes-home 数据卷的容器间对齐 UID/GID。
      # 默认为 1000，以匹配 webui 服务中的 WANTED_UID/WANTED_GID。
      - HERMES_UID=${UID:-1000}
      - HERMES_GID=${GID:-1000}
      # Dashboard 连接到网关以获取健康状况/会话数据
      - GATEWAY_HEALTH_URL=http://hermes-agent:8642
    depends_on:
      - hermes-agent
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    networks:
      - hermes-net

  hermes-webui:
    image: ghcr.io/nesquena/hermes-webui:latest
    container_name: hermes-webui
    depends_on:
      - hermes-agent
    ports:
      # 仅在 localhost 暴露。移除 127.0.0.1: 可在所有网络接口上暴露
      # (如果这样做，请设置 HERMES_WEBUI_PASSWORD)。
      - "127.0.0.1:8787:8787"
    volumes:
      # 与 agent 使用相同的 hermes home —— 共享配置、会话和状态
      - hermes-home:/home/hermeswebui/.hermes
      # 挂载 agent 源码到 docker_init.bash 期望的位置。
      # 以只读方式挂载 —— WebUI 仅在启动时读取此数据卷来安装
      # agent 的 Python 依赖 (`uv pip install`)。
      # 只读挂载在内核层强制执行了纵深防御。
      - hermes-agent-src:/home/hermeswebui/.hermes/hermes-agent:ro
      # 工作区目录 —— 可以从 WebUI 浏览和编辑文件。
      # 请根据您的项目目录调整主机路径。
      # 这里使用 ${HOME} 而不是 `~`，以便在 Linux、macOS、WSL2 和 Windows 的
      # Docker Desktop 上以相同的方式解析默认值。
      - ${HERMES_WORKSPACE:-${HOME}/workspace}:/workspace
    environment:
      - HERMES_WEBUI_HOST=0.0.0.0
      - HERMES_WEBUI_PORT=8787
      - HERMES_WEBUI_STATE_DIR=/home/hermeswebui/.hermes/webui
      # 匹配宿主机用户的 UID/GID 以确保正确的文件权限。
      # 运行 `id -u` 和 `id -g` 来查找您的对应值。
      # 在 macOS 上，UID 从 501 开始 (而不是 1000) —— 请在 .env 文件中进行设置：
      #   echo "UID=$(id -u)" >> .env && echo "GID=$(id -g)" >> .env
      - WANTED_UID=${UID:-1000}
      - WANTED_GID=${GID:-1000}
      # 注意：当使用在容器间共享的绑定挂载数据卷时，所有向该同一主机目录
      # 写入的容器必须以相同的 UID/GID 运行。
      # 如果 hermes-agent 以 root (UID 0) 身份初始化状态目录，hermes-webui
      # 在访问这些路径时将遇到 PermissionError (权限错误) —— 如果身份验证签名密钥文件
      # 不可读，甚至会导致每次 HTTP 请求时崩溃。请将 WANTED_UID 设置为
      # 匹配 agent 容器的 UID，或者使用 Docker 命名数据卷 (推荐)。
      # 可选：设置密码以用于远程访问
      # - HERMES_WEBUI_PASSWORD=your-secret-password
      # WebUI 的绑定挂载权限处理 (修复 #1389, #1399)。
      # 注意：WebUI 的 HERMES_HOME_MODE 是凭据文件的阈值 (允许
      # 在 .env/.signing_key/ 等文件上设置组权限位)，这与 agent 的设置不同，
      # agent 的设置适用于 HERMES_HOME 目录本身。对于 WebUI 来说，0640
      # 是正确的；请勿将此值复制到 agent 服务块中。
      # - HERMES_SKIP_CHMOD=1
      # - HERMES_HOME_MODE=0640
    restart: unless-stopped
    networks:
      - hermes-net

networks:
  hermes-net:
    driver: bridge

volumes:
  # 重要提示 —— 升级 agent 镜像：
  #   `hermes-agent-src` 数据卷在第一次执行 `up` 时从 agent 镜像的
  #   `/opt/hermes` 初始化，在随后的运行中，Docker 会原封不动地重用该数据卷 ——
  #   即使在 `docker pull` 获取了较新的 agent 镜像之后也是如此。在
  #   升级 agent 镜像后，请运行：
  #
  #     docker compose -f docker-compose.three-container.yml down
  #     docker volume rm <project>_hermes-agent-src
  #     docker compose -f docker-compose.three-container.yml pull
  #     docker compose -f docker-compose.three-container.yml up -d
  #
  #   完整过程（及其原因）记录在 docs/docker.md 中。
  hermes-home:
  hermes-agent-src:
